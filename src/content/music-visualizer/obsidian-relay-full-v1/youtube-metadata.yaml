title: "Obsidian Relay — 10 Minutes of Midnight Focus Beats"
description: |
  An original 10-minute broken-beat focus session for coding, studying, writing, and late-night work.

Syncopated low-end and airy synthetic textures meet a deep-blue architectural light study. The music shifts the room's reflections and edge light without turning the image into a restless equalizer.

Headphones recommended.

Original music and visuals by Visual And Sound.
