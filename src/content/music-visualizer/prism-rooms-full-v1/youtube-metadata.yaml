title: "Prism Rooms — 10 Minutes of Quiet Piano & Light"
description: |
  An original 10-minute piano focus session for reading, studying, writing, and quiet work.

  Three luminous rooms unfold slowly while the music is translated into gentle changes of transmitted light, edge shimmer, and floor reflections — no distracting visual beat-chasing.

  Headphones recommended.

  Original music and visuals by Visual And Sound.
