title: "Nocturne Glasshouse — 10 Minutes of Late-Night Focus Music"
description: |
  An original 10-minute late-night focus session for reading, programming, writing, and winding down after work.

Warm Rhodes, a soft analog pulse, and a quiet glass installation move through cool cyan, lavender, and amber light. The visual remains calm: music changes the material light, never the composition.

Headphones recommended.

Original music and visuals by Visual And Sound.
