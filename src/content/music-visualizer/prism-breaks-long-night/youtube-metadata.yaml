title: "Prism Breaks — 10 Minutes of Broken-Beat Focus Music"
description: |
  An original 10-minute broken-beat focus session for studying, coding, reading, and deep work.

  Syncopated low-end, airy synthetic mallets, and a cool luminous visual that responds quietly to the music's strongest pulses.

  Headphones recommended.

  Music and visuals by Visual And Sound.
