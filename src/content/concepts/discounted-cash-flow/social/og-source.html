<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=1200, initial-scale=1">
  <title>Discounted Cash Flow · Open Graph</title>
  <style>
    * { box-sizing: border-box; }
    html, body { width: 1200px; height: 627px; margin: 0; overflow: hidden; }
    body { color: #181714; background: #f4f0e7; font-family: Inter, "Helvetica Neue", Arial, sans-serif; }
    .og {
      position: relative; display: grid; grid-template-columns: 53% 47%;
      width: 100%; height: 100%; overflow: hidden; border: 16px solid #181714;
    }
    .grid {
      position: absolute; inset: 0; opacity: .46;
      background-image:
        linear-gradient(rgba(24,23,20,.055) 1px, transparent 1px),
        linear-gradient(90deg, rgba(24,23,20,.055) 1px, transparent 1px);
      background-size: 46px 46px;
    }
    .copy, .visual { position: relative; z-index: 2; }
    .copy { display: flex; flex-direction: column; padding: 48px 22px 42px 52px; }
    .brand {
      display: flex; align-items: center; gap: 13px;
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      font-size: 15px; font-weight: 850; letter-spacing: .15em;
    }
    .mark {
      display: block; width: 42px; height: 42px;
      border-radius: 12px; object-fit: contain;
    }
    .eyebrow {
      margin-top: 65px; color: #ff6948;
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      font-size: 14px; font-weight: 850; letter-spacing: .14em; text-transform: uppercase;
    }
    h1 { margin: 18px 0 0; font-size: 68px; font-weight: 760; line-height: .91; letter-spacing: -.065em; }
    .thesis {
      margin-top: auto; padding-left: 17px; border-left: 8px solid #d8ff68;
      font-size: 22px; font-weight: 680; line-height: 1.18; letter-spacing: -.025em;
    }
    .visual { display: flex; align-items: center; justify-content: center; padding: 58px 42px 58px 12px; }
    .stage {
      position: relative; width: 100%; height: 100%; overflow: hidden;
      border: 1.5px solid rgba(24,23,20,.24); border-radius: 30px;
      background: rgba(255,255,255,.62); box-shadow: 0 28px 70px rgba(48,37,21,.1);
    }
    .stage-label {
      position: absolute; z-index: 2; left: 27px; top: 25px; color: #6f6a61;
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      font-size: 11px; letter-spacing: .13em;
    }
    .axis { position: absolute; right: 34px; bottom: 92px; left: 34px; border-bottom: 1px solid rgba(24,23,20,.2); }
    .bars {
      position: absolute; inset: 0; display: flex; align-items: end; justify-content: space-between;
      padding: 0 40px 93px;
    }
    .year { position: relative; width: 68px; height: 280px; }
    .future {
      position: absolute; right: 9px; bottom: 0; left: 9px; height: var(--future);
      border: 2px solid rgba(117,103,246,.5); border-radius: 14px 14px 4px 4px;
      background: rgba(117,103,246,.11);
    }
    .present {
      position: absolute; right: 9px; bottom: 0; left: 9px; height: var(--present);
      border-radius: 12px 12px 3px 3px; background: #ff6948;
    }
    .year b {
      position: absolute; right: 0; bottom: -29px; left: 0; text-align: center;
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace; font-size: 10px;
    }
    .equation {
      position: absolute; right: 26px; bottom: 25px; left: 26px;
      display: flex; align-items: center; justify-content: space-between;
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      font-size: 10px; font-weight: 850; letter-spacing: .07em;
    }
    .equation span:last-child { color: #ff6948; }
  </style>
</head>
<body>
  <main class="og">
    <div class="grid"></div>
    <section class="copy">
      <div class="brand">
        <img class="mark" src="../../../../../assets/aaron-logo-assets/aaron-guo-website-logo.png" alt="">
        AARON GUO
      </div>
      <div class="eyebrow">Working vocabulary / 007</div>
      <h1>Discounted<br>Cash Flow</h1>
      <div class="thesis">Future cash + time + risk<br>→ value today.</div>
    </section>
    <section class="visual">
      <div class="stage">
        <div class="stage-label">FUTURE CASH → PRESENT VALUE</div>
        <div class="axis"></div>
        <div class="bars">
          <div class="year" style="--future: 142px; --present: 131px;"><div class="future"></div><div class="present"></div><b>Y1</b></div>
          <div class="year" style="--future: 166px; --present: 138px;"><div class="future"></div><div class="present"></div><b>Y2</b></div>
          <div class="year" style="--future: 193px; --present: 144px;"><div class="future"></div><div class="present"></div><b>Y3</b></div>
          <div class="year" style="--future: 224px; --present: 149px;"><div class="future"></div><div class="present"></div><b>Y4</b></div>
          <div class="year" style="--future: 260px; --present: 154px;"><div class="future"></div><div class="present"></div><b>Y5</b></div>
        </div>
        <div class="equation"><span>FUTURE CASH + TIME + RISK</span><span>→ VALUE TODAY</span></div>
      </div>
    </section>
  </main>
</body>
</html>
