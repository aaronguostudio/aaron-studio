title: "I Gave Codex a Task From a Moving Tesla"
description: |
  I was in a Tesla on the way to California when I opened Codex on my phone and gave it a real task: go into my Notion task tracker, work on the blog analysis task, and use the Superpowers workflow.

  At the same time, Claude Code had just finished a separate long-running development task. That was the moment AI stopped feeling like a tool and started feeling like a personal operating system.

  In this video, I break down how my workflow changed over the last two months: coding with agents, writing, image generation, Seedance video experiments, Notion task routing, scheduled jobs, blog analytics, and self-improving feedback loops.

  CHAPTERS
  0:00 - The Tesla moment
  0:29 - From tool to environment
  1:12 - Coding became a run
  1:58 - Work escaped the IDE
  2:50 - The operating loop
  3:44 - Notion as the dispatch surface
  4:20 - Self enhancement layer
  4:56 - Video learns too
  5:21 - Judgment moves up
  6:04 - Life gets bigger
  6:48 - The durable edge

  KEY TAKEAWAYS
  - The biggest AI productivity shift is not faster tasks. It is changing the unit of work.
  - Coding was the first door because software already has files, tests, diffs, branches, and reviewable artifacts.
  - The same agent workflow now applies to writing, video, analytics, admin, and daily operations.
  - Superpowers matters because it turns ad hoc prompting into a repeatable workflow.
  - The durable edge is designing a human-agent operating system that can execute, report back, and learn.
  - AI should make life bigger, not just fill every saved minute with more work.

